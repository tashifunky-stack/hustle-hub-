<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hustle Hub Pro | Get Started</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: sans-serif;
            color: white;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 35px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin: 0;
            font-size: 2rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .services-list {
            text-align: left;
            background: rgba(15,23,42,0.6);
            padding: 20px;
            border-radius: 16px;
            margin: 25px 0;
            border: 1px solid rgba(56,189,248,0.1);
        }

        .services-list p {
            margin: 10px 0;
            font-size: 15px;
        }

        .badges {
            font-size: 12px;
            color: #4ade80;
            letter-spacing: 1px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .glow-btn {
            display: block;
            background: #25d366;
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            margin-top: 25px;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .footer-link {
            display: block;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 12px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>HUSTLE HUB 🤑🎯</h1>
        <p class="subtitle">The Official Blueprint for Kenyan Gigs</p>
        
        <div class="services-list">
            <p>✅ AI Training Tasks</p>
            <p>✅ Transcription Work</p>
            <p>✅ Content Writing</p>
        </div>

        <div class="badges">
            ✓ VERIFIED • ✓ SECURE • ✓ M-PESA READY
        </div>

        <a href="https://chat.whatsapp.com/Jlk7B6NYi5J9R8nN48SwxW" class="glow-btn">JOIN GROUP</a>
        
        <a href="https://tashifunky-stack.github.io/hustle-hub-/" class="footer-link">Back to Official Portal</a>
    </div>

</body>
</html>
