<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUCCPS Application Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #e9ecef; }
        header { background-color: #003366; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .dashboard { display: flex; max-width: 900px; margin: 20px auto; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .sidebar { background-color: #343a40; color: white; width: 30%; padding: 20px; }
        .sidebar h3 { margin-top: 0; color: #ffcc00; }
        .sidebar p { font-size: 14px; line-height: 1.6; }
        .main-content { width: 70%; padding: 30px; }
        .price-badge { background-color: #28a745; color: white; padding: 10px; border-radius: 5px; display: inline-block; font-weight: bold; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-pay { background-color: #003366; color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pay:hover { background-color: #002244; }
        
        /* Mobile friendly */
        @media (max-width: 600px) {
            .dashboard { flex-direction: column; margin: 10px; }
            .sidebar, .main-content { width: 100%; padding: 15px; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<header>
    KUCCPS Premium Application Portal
</header>

<div class="dashboard">
    <div class="sidebar">
        <h3>How It Works</h3>
        <p>1. Fill in your exact details.</p>
        <p>2. Pay the fixed service fee.</p>
        <p>3. Our agents will process your application and send you the confirmation receipt.</p>
        <hr style="border-color: #555;">
        <p>🔒 <strong>Secure & Fast</strong></p>
        <p>📞 Support Available</p>
    </div>

    <div class="main-content">
        <h2>Start Your Application</h2>
        
        <div class="price-badge">Fixed Service Fee: Ksh 200</div>

        <label>Full Name</label>
        <input type="text" id="studentName" placeholder="John Doe">

        <label>KCSE Index Number</label>
        <input type="text" id="indexNumber" placeholder="e.g. 12345678901">

        <label>Preferred Course Type</label>
        <select id="courseType">
            <option value="Degree">Degree</option>
            <option value="Diploma">Diploma</option>
            <option value="Certificate">Certificate</option>
        </select>

        <label>Course Name (e.g., Clinical Medicine)</label>
        <input type="text" id="courseName" placeholder="Enter course name">

        <button class="btn-pay" onclick="sendToWhatsApp()">Pay Ksh 200 & Apply via WhatsApp</button>
    </div>
</div>

<script>
    function sendToWhatsApp() {
        // Get the values the student typed
        var name = document.getElementById('studentName').value;
        var index = document.getElementById('indexNumber').value;
        var type = document.getElementById('courseType').value;
        var course = document.getElementById('courseName').value;

        // Your WhatsApp phone number (Include 254 and remove the 0)
        var phoneNumber = "254700000000"; // <--- CHANGE THIS TO YOUR NUMBER!

        // Create the message
        var message = "Hello, I want to use your KUCCPS service.\n\n" +
                      "Name: " + name + "\n" +
                      "Index: " + index + "\n" +
                      "Level: " + type + "\n" +
                      "Course: " + course + "\n\n" +
                      "I am ready to pay the Ksh 200 fixed fee via M-PESA. Please provide the Till/Phone number.";

        // Convert message to a WhatsApp link
        var whatsappURL = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);

        // Open WhatsApp
        window.open(whatsappURL, "_blank");
    }
</script>

</body>
</html>
