<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal 2026</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #1e293b; --accent: #3b82f6; --text: #334155; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); }

        /* Modern Navigation */
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: transparent; }
        .menu-toggle { cursor: pointer; font-size: 24px; padding: 10px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .brand-name { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; color: var(--primary); }

        /* Clean Pop-out Menu */
        .sidebar { position: fixed; left: -300px; top: 0; height: 100vh; width: 300px; background: white; z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        .sidebar.open { left: 0; }
        .sidebar-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; text-decoration: none; color: var(--text); display: block; font-weight: 500; transition: 0.2s; }
        .sidebar-item:hover { background: #f1f5f9; color: var(--accent); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); display: none; z-index: 1500; }
        .overlay.show { display: block; }

        /* Dashboard Sheet */
        .sheet { max-width: 650px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 35px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.04); margin-bottom: 25px; border: 1px solid #f1f5f9; }
        
        h2 { font-size: 1.5rem; margin-top: 0; color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        label { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; display: block; margin-bottom: 8px; }
        
        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 1rem; color: var(--primary); transition: 0.2s; }
        select:focus, input:focus { outline: none; border-color: var(--accent); ring: 2px rgba(59, 130, 246, 0.1); }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-whatsapp { background: var(--success); color: white; margin-top: 25px; box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.2); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .result-sheet { background: #f8fafc; border-radius: 15px; padding: 20px; text-align: center; display: none; margin-top: 20px; border: 1px dashed #cbd5e1; }
        .points-text { font-size: 2.5rem; font-weight: 800; color: var(--accent); display: block; }
    </style>
</head>
<body>

<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="brand-name">PORTAL•2026</div>
    <div style="width:40px;"></div> </nav>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div style="font-size:1.5rem; font-weight:800; margin-bottom:30px;">Menu</div>
    <a href="#calc" class="sidebar-item" onclick="toggleMenu()">Calculator</a>
    <a href="#apply" class="sidebar-item" onclick="toggleMenu()">Registration</a>
    <a href="https://wa.me/254742050267" class="sidebar-item">Live Support</a>
    <div style="margin-top:auto; padding:20px; background:#f8fafc; border-radius:15px; font-size:0.8rem;">
        <strong>Total Package: 1,850/-</strong><br>
        Includes 1,500 government fee.
    </div>
</div>

<div class="sheet">
    
    <div class="card" id="calc">
        <h2>Cluster Sheet</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Subject 1</label>
                <select id="s1"><option value="12">A</option><option value="11">A-</option><option value="10">B+</option><option value="9">B</option><option value="8">B-</option><option value="7">C+</option><option value="6">C</option></select>
            </div>
            <div class="input-group">
                <label>Subject 2</label>
                <select id="s2"><option value="12">A</option><option value="11">A-</option><option value="10">B+</option><option value="9">B</option><option value="8">B-</option><option value="7">C+</option><option value="6">C</option></select>
            </div>
            <div class="input-group">
                <label>Subject 3</label>
                <select id="s3"><option value="12">A</option><option value="11">A-</option><option value="10">B+</option><option value="9">B</option><option value="8">B-</option><option value="7">C+</option><option value="6">C</option></select>
            </div>
            <div class="input-group">
                <label>Subject 4</label>
                <select id="s4"><option value="12">A</option><option value="11">A-</option><option value="10">B+</option><option value="9">B</option><option value="8">B-</option><option value="7">C+</option><option value="6">C</option></select>
            </div>
        </div>
        <div class="input-group">
            <label>Total KCSE Aggregate</label>
            <input type="number" id="agg" placeholder="Total Points (Max 84)">
        </div>
        <button class="btn btn-primary" onclick="runCalc()">Update Calculations</button>

        <div class="result-sheet" id="res">
            <span style="font-weight:600; font-size:0.9rem;">Weighted Cluster</span>
            <span class="points-text" id="val">0.000</span>
        </div>
    </div>

    <div class="card" id="apply">
        <h2>Registration</h2>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Official Name">
        </div>
        <div class="input-group">
            <label>Index Number</label>
            <input type="text" id="idx" placeholder="11-digit index">
        </div>
        <div class="input-group">
            <label>Course Interest</label>
            <input type="text" id="course" placeholder="e.g. Clinical Medicine">
        </div>
        <button class="btn btn-whatsapp" onclick="send()">Complete Application (1,850/-)</button>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    function runCalc() {
        const sum = parseFloat(document.getElementById('s1').value) + 
                    parseFloat(document.getElementById('s2').value) + 
                    parseFloat(document.getElementById('s3').value) + 
                    parseFloat(document.getElementById('s4').value);
        const agg = parseFloat(document.getElementById('agg').value) || 0;
        
        if(agg > 84 || agg < 1) { alert("Please enter valid aggregate points"); return; }
        
        const cluster = Math.sqrt((sum/48) * (agg/84)) * 48;
        document.getElementById('res').style.display = "block";
        document.getElementById('val').innerText = cluster.toFixed(3);
    }

    function send() {
        const name = document.getElementById('name').value;
        const pts = document.getElementById('val').innerText;
        if(!name) { alert("Please enter your name"); return; }
        
        const msg = `*KUCCPS 2026 REGISTRATION*\nName: ${name}\nCluster: ${pts}\n\nReady for full placement (1,850 KES).`;
        window.open(`https://wa.me/254742050267?text=${encodeURIComponent(msg)}`);
    }
</script>

</body>
            </html>
