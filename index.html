<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUCCPS Assistant | 2026 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #2563eb; --text: #334155; --success: #16a34a; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); scroll-behavior: smooth; }

        /* Navigation */
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 24px; padding: 8px; border-radius: 8px; transition: 0.2s; }
        .menu-btn:hover { background: #f1f5f9; }
        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; color: var(--primary); }

        /* Glass Sidebar */
        .sidebar { position: fixed; left: -300px; top: 0; height: 100vh; width: 280px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 24px; box-shadow: 20px 0 50px rgba(0,0,0,0.05); border-right: 1px solid #e2e8f0; }
        .sidebar.active { left: 0; }
        .sidebar h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 20px; }
        .sidebar a { display: block; padding: 12px 16px; margin-bottom: 8px; border-radius: 10px; text-decoration: none; color: var(--text); font-weight: 600; transition: 0.2s; }
        .sidebar a:hover { background: #f1f5f9; color: var(--accent); }
        
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(4px); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        /* Clean Sheet Content */
        .layout { max-width: 650px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--card); border-radius: 24px; padding: 40px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02), 0 8px 10px -6px rgba(0,0,0,0.02); margin-bottom: 30px; border: 1px solid #f1f5f9; }
        
        h2 { font-size: 1.5rem; margin-top: 0; color: var(--primary); font-weight: 800; }
        p.subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 25px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #94a3b8; display: block; margin-bottom: 8px; }
        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; transition: 0.2s; font-family: inherit; }
        select:focus, input:focus { outline: none; border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-calc { background: var(--primary); color: white; margin-top: 10px; }
        .btn-whatsapp { background: var(--success); color: white; margin-top: 30px; box-shadow: 0 10px 20px -5px rgba(22, 163, 74, 0.3); }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }

        .result-sheet { background: #eff6ff; border-radius: 16px; padding: 24px; text-align: center; display: none; margin-top: 25px; border: 1px solid #dbeafe; }
        .points-val { font-size: 2.5rem; font-weight: 800; color: var(--accent); display: block; }
        
        .badge { background: #fef3c7; color: #92400e; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }

        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="brand">PORTAL•2026</div>
    <div style="width: 40px;"></div>
</nav>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; color: var(--primary);">Menu</div>
    <h3>Navigation</h3>
    <a href="#calc" onclick="toggleSidebar()">Cluster Calculator</a>
    <a href="#apply" onclick="toggleSidebar()">Full Registration</a>
    <a href="https://wa.me/254742050267" onclick="toggleSidebar()">Contact Agent</a>
    <div style="margin-top: auto; background: #f8fafc; padding: 20px; border-radius: 12px; font-size: 0.8rem;">
        <span style="display:block; margin-bottom: 4px; font-weight: 700;">Package Info</span>
        Total Cost: 1,850 KES<br>
        (Includes 1,500 Govt Fee)
    </div>
</div>

<div class="layout">
    
    <div class="card" id="calc">
        <h2>Cluster Sheet</h2>
        <p class="subtitle">Select grades for your 4 required subjects.</p>
        
        <div class="grid-2">
            <div>
                <label>Subject 1</label>
                <select id="g1">
                    <option value="12">A (12)</option><option value="11">A- (11)</option><option value="10">B+ (10)</option>
                    <option value="9">B (9)</option><option value="8">B- (8)</option><option value="7">C+ (7)</option>
                    <option value="6">C (6)</option>
                </select>
            </div>
            <div>
                <label>Subject 2</label>
                <select id="g2">
                    <option value="12">A (12)</option><option value="11">A- (11)</option><option value="10">B+ (10)</option>
                    <option value="9">B (9)</option><option value="8">B- (8)</option><option value="7">C+ (7)</option>
                    <option value="6">C (6)</option>
                </select>
            </div>
            <div>
                <label>Subject 3</label>
                <select id="g3">
                    <option value="12">A (12)</option><option value="11">A- (11)</option><option value="10">B+ (10)</option>
                    <option value="9">B (9)</option><option value="8">B- (8)</option><option value="7">C+ (7)</option>
                    <option value="6">C (6)</option>
                </select>
            </div>
            <div>
                <label>Subject 4</label>
                <select id="g4">
                    <option value="12">A (12)</option><option value="11">A- (11)</option><option value="10">B+ (10)</option>
                    <option value="9">B (9)</option><option value="8">B- (8)</option><option value="7">C+ (7)</option>
                    <option value="6">C (6)</option>
                </select>
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <label>KCSE Aggregate Points (Max 84)</label>
            <input type="number" id="overall" placeholder="e.g. 65">
        </div>

        <button class="btn btn-calc" onclick="calculate()">Calculate Cluster</button>

        <div id="resultBox" class="result-sheet">
            <span style="font-weight: 600; color: #3b82f6; font-size: 0.8rem; text-transform: uppercase;">Your Weighted Cluster</span>
            <span id="finalPoints" class="points-val">0.000</span>
        </div>
    </div>

    <div class="card" id="apply">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 style="margin:0;">Registration</h2>
            <span class="badge">1,850 KES</span>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="As per KCSE Slip">
        </div>
        
        <div class="grid-2">
            <div>
                <label>KCSE Index</label>
                <input type="text" id="index" placeholder="11-digit number">
            </div>
            <div>
                <label>Target Course</label>
                <input type="text" id="course" placeholder="e.g. Nursing">
            </div>
        </div>

        <button class="btn btn-whatsapp" onclick="sendToWhatsApp()">SUBMIT & PAY TOTAL</button>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function calculate() {
        const g1 = parseFloat(document.getElementById('g1').value);
        const g2 = parseFloat(document.getElementById('g2').value);
        const g3 = parseFloat(document.getElementById('g3').value);
        const g4 = parseFloat(document.getElementById('g4').value);
        const agg = parseFloat(document.getElementById('overall').value);

        if(!agg || agg > 84) { alert("Please enter valid aggregate points (1-84)"); return; }

        const s = g1 + g2 + g3 + g4;
        const weighted = Math.sqrt((s/48) * (agg/84)) * 48;

        document.getElementById('resultBox').style.display = "block";
        document.getElementById('finalPoints').innerText = weighted.toFixed(3);
    }

    function sendToWhatsApp() {
        const name = document.getElementById('name').value;
        const index = document.getElementById('index').value;
        const points = document.getElementById('finalPoints').innerText;

        if(!name || !index) { alert("Please fill in your Name and Index Number"); return; }

        const phone = "254742050267";
        const msg = `*KUCCPS 2026 REGISTRATION*\nName: ${name}\nIndex: ${index}\nCluster: ${points}\n\nI am ready to proceed with the full payment (1,850 KES).`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
    </html>
